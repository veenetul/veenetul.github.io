  <!-- CSS -->

  <style>
    .error-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: var(--gap);
      text-align: center;
    }

    .error-code {
      font-size: clamp(3rem, 15vw, 8rem);
      font-weight: 700;
      color: var(--primary);
      margin: 0;
      line-height: 1;
    }

    .error-title {
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      font-weight: 600;
      margin: 1rem 0;
      color: var(--text);
    }

    .error-desc {
      font-size: 1rem;
      color: var(--muted);
      max-width: 600px;
      margin: 1rem 0 2rem;
    }

    .error-buttons {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .error-button {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background: var(--primary);
      color: #1f1f1f;
      border-radius: var(--radius);
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.1s ease, box-shadow 0.1s ease;
      cursor: pointer;
    }

    .error-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(244, 187, 255, 0.3);
    }

    .error-button-secondary {
      background: #2a2a2a;
      color: var(--text);
    }

    .error-button-secondary:hover {
      background: #323232;
    }
  </style>
</head>
